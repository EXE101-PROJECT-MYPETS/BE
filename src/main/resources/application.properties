spring.application.name=exe101_project

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.schemas=${DB_SCHEMA:prod}
spring.flyway.default-schema=${DB_SCHEMA:prod}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:prod}
spring.flyway.create-schemas=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

jwt.secret-key=${JWT_SECRET}
app.jwt.access-exp-ms=2592000000
app.refresh.exp-ms=604800000

supabase.url=${SUPABASE_URL}
supabase.service-key=${SUPABASE_SERVICE_KEY}
supabase.bucket=${SUPABASE_BUCKET}

ghtk.config.encryption-key=${GHTK_CONFIG_ENCRYPTION_KEY:}
ghtk.submit-order-url=${GHTK_SUBMIT_ORDER_URL:https://services.giaohangtietkiem.vn/services/shipment/order/?ver=1.5}
ghtk.fee-url=${GHTK_FEE_URL:https://services.giaohangtietkiem.vn/services/shipment/fee}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
app.email.from=${MAIL_FROM:${MAIL_USERNAME:}}
app.email.brand-name=${EMAIL_BRAND_NAME:EXE101 Pet Spa}
app.email.support-email=${EMAIL_SUPPORT_EMAIL:${MAIL_FROM:${MAIL_USERNAME:}}}
app.email.verification-code-exp-minutes=${EMAIL_VERIFICATION_CODE_EXP_MINUTES:10}

gemini.api-key=${GEMINI_API_KEY}
gemini.chat-model=gemini-2.5-flash
gemini.embedding-model=gemini-embedding-001
gemini.base-url=https://generativelanguage.googleapis.com/v1beta