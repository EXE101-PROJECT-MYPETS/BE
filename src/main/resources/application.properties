spring.application.name=exe101_project

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.schemas=${DB_SCHEMA:prod}
spring.flyway.default-schema=${DB_SCHEMA:prod}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:prod}
spring.flyway.create-schemas=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

jwt.secret-key=${JWT_SECRET}
app.jwt.access-exp-ms=1800000
app.refresh.exp-ms=604800000

app.upload-dir=${UPLOAD_DIR:D:/EXE101}
app.public-base-url=${PUBLIC_BASE_URL:http://localhost:8080/files}

supabase.url=${SUPABASE_URL}
supabase.service-key=${SUPABASE_SERVICE_KEY}
supabase.bucket=${SUPABASE_BUCKET}

