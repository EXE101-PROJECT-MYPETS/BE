spring.application.name=exe101_project

# DB (??c t? env)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=10000

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=${DB_SCHEMA:prod}
spring.flyway.default-schema=${DB_SCHEMA:prod}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:prod}
spring.flyway.create-schemas=true

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Render port
server.port=${PORT:8080}

# JWT (??c t? env)
jwt.secret-key=${JWT_SECRET}
app.jwt.access-exp-ms=1800000
app.refresh.exp-ms=604800000

# Storage (??c t? env, c¾ default)
app.storage.root=${STORAGE_ROOT:/tmp/storage}
app.upload-dir=${UPLOAD_DIR:/tmp/storage}
app.storage.public-base-url=${PUBLIC_BASE_URL:/files}
