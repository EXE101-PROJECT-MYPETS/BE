spring.application.name=exe101_project

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-init-sql=SET search_path TO ${DB_SCHEMA:prod}, public

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.schemas=${DB_SCHEMA:prod}
spring.flyway.default-schema=${DB_SCHEMA:prod}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:prod}
spring.flyway.create-schemas=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}
app.cors.allowed-origin-patterns=http://localhost:*,http://localhost:3000,http://localhost:5173,https://exe-fe-gold.vercel.app,https://pawply.site,https://www.pawply.site,https://exe-fe-pink.vercel.app,https://*.vercel.app

jwt.secret-key=${JWT_SECRET}
app.jwt.access-exp-ms=2592000000
app.refresh.exp-ms=604800000

supabase.url=${SUPABASE_URL}
supabase.service-key=${SUPABASE_SERVICE_KEY}
supabase.bucket=${SUPABASE_BUCKET}

ghtk.config.encryption-key=${GHTK_CONFIG_ENCRYPTION_KEY:}
ghtk.submit-order-url=${GHTK_SUBMIT_ORDER_URL:https://services.giaohangtietkiem.vn/services/shipment/order/?ver=1.5}
ghtk.fee-url=${GHTK_FEE_URL:https://services.giaohangtietkiem.vn/services/shipment/fee}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
app.email.from=${MAIL_FROM:${MAIL_USERNAME:}}
app.email.brand-name=${EMAIL_BRAND_NAME:EXE101 Pet Spa}
app.email.support-email=${EMAIL_SUPPORT_EMAIL:${MAIL_FROM:${MAIL_USERNAME:}}}
app.email.verification-code-exp-minutes=${EMAIL_VERIFICATION_CODE_EXP_MINUTES:10}
sepay.ipn-secret-key=${SEPAY_IPN_SECRET_KEY:}
sepay.bank-code=${SEPAY_BANK_CODE:}
sepay.bank-name=${SEPAY_BANK_NAME:MB Bank}
sepay.account-number=${SEPAY_ACCOUNT_NUMBER:}
sepay.account-name=${SEPAY_ACCOUNT_NAME:}
sepay.qr-base-url=${SEPAY_QR_BASE_URL:https://qr.sepay.vn/img}
sepay.webhook-auth-enabled=${SEPAY_WEBHOOK_AUTH_ENABLED:true}
subscription.monthly-price=${SUBSCRIPTION_MONTHLY_PRICE:500000}
subscription.monthly-days=${SUBSCRIPTION_MONTHLY_DAYS:30}
subscription.trial-days=${SUBSCRIPTION_TRIAL_DAYS:15}
payment.expire-minutes=${PAYMENT_EXPIRE_MINUTES:15}
payment.grace-minutes=${PAYMENT_GRACE_MINUTES:10}
payment.late-grace-minutes=${PAYMENT_LATE_GRACE_MINUTES:60}

gemini.api-key=${GEMINI_API_KEY}
gemini.chat-model=gemini-2.5-flash
gemini.embedding-model=gemini-embedding-001
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
