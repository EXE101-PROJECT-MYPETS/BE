<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
</head>
<body style="margin:0;padding:0;background:#f3f6fa;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f3f6fa;padding:28px 12px;">
    <tr>
        <td align="center">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
                   style="max-width:620px;background:#ffffff;border:1px solid #dfe6ef;border-radius:10px;overflow:hidden;">
                <tr>
                    <td style="background:#0f766e;padding:24px 30px;color:#ffffff;">
                        <div style="font-size:20px;font-weight:700;">{{brandName}}</div>
                        <div style="font-size:13px;margin-top:6px;opacity:.9;">Dịch vụ chăm sóc thú cưng</div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:30px;">
                        <h1 style="margin:0 0 18px;font-size:22px;line-height:1.35;color:#111827;">{{title}}</h1>
                        <div style="font-size:15px;line-height:1.7;color:#374151;">{{body}}</div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:18px 30px;background:#f9fafb;border-top:1px solid #e5e7eb;color:#6b7280;font-size:12px;line-height:1.6;">
                        <div>{{supportLine}}</div>
                        <div style="margin-top:8px;">Email này được gửi tự động từ {{brandName}}. Vui lòng không trả lời
                            trực tiếp email này.
                        </div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
