<p>Xin chào <strong>{{customerName}}</strong>,</p>

       style="margin:20px 0;border-collapse:collapse;border:1px solid #d8e0ec;border-radius:8px;overflow:hidden;">

        <td style="padding:12px 14px;background:#f8fafc;border-bottom:1px solid #e5e7eb;color:#64748b;">Mã đơn</td>
        <td style="padding:12px 14px;border-bottom:1px solid #e5e7eb;font-weight:700;color:#111827;">{{orderCode}}</td>
    </tr>
    <tr>
        <td style="padding:12px 14px;background:#f8fafc;border-bottom:1px solid #e5e7eb;color:#64748b;">Tổng tiền</td>
        <td style="padding:12px 14px;border-bottom:1px solid #e5e7eb;font-weight:700;color:#111827;">{{totalAmount}}
        </td>
    </tr>
    <tr>
        <td style="padding:12px 14px;background:#f8fafc;color:#64748b;">Địa chỉ giao</td>
        <td style="padding:12px 14px;">{{shippingAddress}}</td>
